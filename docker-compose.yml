services:
  backend:
    build: ./backend
    #need docker file in backend folder to build the image
    container_name: backend
    restart: always
    env_file: ./backend/.env
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      # need docker file in frontend folder to build the image
      args:
       VITE_BACKEND_URL: "http://56.228.35.26:3000"
    container_name: frontend
    restart: always
    env_file: ./frontend/.env
    depends_on:
      - backend
    ports:
      - 5170:5173

  admin:
    build:
      context: ./admin
      # need docker file in admin folder to build the image
      args:
       VITE_BACKEND_URL: "http://56.228.35.26:3000"
    container_name: admin
    restart: always
    env_file: ./admin/.env
    depends_on:
      - backend
    ports:
      - 5171:5174
